spring:
  application:
    name: english.iplusone.api
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  temperature: 0.7
  timeout: 30s
